<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0a0a0f"/>
  
  <!-- Left bracket < -->
  <polyline points="11,8 5,16 11,24" 
    fill="none" stroke="#4f8ef7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Right bracket > -->
  <polyline points="21,8 27,16 21,24" 
    fill="none" stroke="#4f8ef7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Slash / in middle -->
  <line x1="19" y1="7" x2="13" y2="25" 
    stroke="#4f8ef7" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
</svg>